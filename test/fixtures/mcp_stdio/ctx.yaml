name: "@test/github-mcp"
version: "2.1.0"
type: mcp
description: "GitHub MCP server for repository operations"
keywords: [github, git, mcp]
mcp:
  transport: stdio
  command: npx
  args: ["-y", "@modelcontextprotocol/server-github"]
  env:
    - name: GITHUB_TOKEN
      required: true
      description: "GitHub personal access token"
